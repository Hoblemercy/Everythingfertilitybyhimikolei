<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Premium Order Tracking</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

<style>
:root {
  --primary:#6366f1;
  --accent:#a78bfa;
  --bg:#0a0f1c;
  --card:rgba(15,23,42,0.85);
  --text:#f8fafc;
  --muted:#94a3b8;
  --success:#10b981;
}

*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:'Inter',sans-serif;
  background:radial-gradient(circle at top,#111827,#020617);
  color:var(--text);
}

.container{
  max-width:1200px;
  margin:auto;
  padding:20px;
}

header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:30px;
  flex-wrap:wrap;
  gap:10px;
}

.logo{
  font-family:'Playfair Display',serif;
  font-size:clamp(20px,4vw,30px);
  background:linear-gradient(90deg,#6366f1,#a78bfa);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.grid{
  display:grid;
  grid-template-columns:1.2fr 1fr;
  gap:20px;
}

.card{
  background:var(--card);
  backdrop-filter:blur(18px);
  border-radius:24px;
  padding:20px;
  border:1px solid rgba(255,255,255,0.05);
}

.status-box{
  display:flex;
  justify-content:space-between;
  align-items:center;
  flex-wrap:wrap;
  gap:10px;
}

.badge{
  padding:8px 14px;
  border-radius:999px;
  font-size:12px;
  font-weight:600;
}

.progress-bar{
  height:8px;
  background:#1e293b;
  border-radius:10px;
  margin-top:12px;
  overflow:hidden;
}

.progress{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,#6366f1,#a78bfa);
}

.timeline{
  margin-top:20px;
}

.timeline-item{
  display:flex;
  gap:12px;
  margin-bottom:15px;
  align-items:center;
}

.timeline-icon{
  min-width:36px;
  height:36px;
  border-radius:50%;
  background:#1e293b;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:14px;
}

.product-gallery{
  display:flex;
  gap:10px;
  overflow-x:auto;
}

.product-gallery img{
  width:80px;
  height:80px;
  border-radius:12px;
  object-fit:cover;
  flex-shrink:0;
}

.actions{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

.btn{
  flex:1;
  text-align:center;
  padding:12px;
  border-radius:10px;
  font-weight:600;
  text-decoration:none;
  font-size:14px;
}

.primary{background:linear-gradient(90deg,#6366f1,#a78bfa);color:#fff}
.secondary{background:#1e293b;color:#fff}

.live-dot{
  width:10px;height:10px;border-radius:50%;background:#10b981;
  animation:pulse 1.5s infinite;
}

@keyframes pulse{
  0%{transform:scale(1);opacity:1}
  50%{transform:scale(1.5);opacity:.5}
  100%{transform:scale(1);opacity:1}
}

/* TABLET */
@media(max-width:1024px){
  .grid{
    grid-template-columns:1fr;
  }
}

/* MOBILE */
@media(max-width:600px){
  .container{padding:15px}

  .card{
    padding:16px;
    border-radius:18px;
  }

  .timeline-item{
    align-items:flex-start;
  }

  .btn{
    font-size:13px;
    padding:10px;
  }
}

</style>
</head>
<body>

<div class="container">

<header>
  <div class="logo">Everythingfertilitybyhimiko</div>
  <div style="display:flex;align-items:center;gap:8px">
    <div class="live-dot"></div>
    <small>Live Tracking</small>
  </div>
</header>

<div class="grid">

<div>

<div class="card">
  <div class="status-box">
    <div>
      <h2 id="orderNumber">Order #----</h2>
      <small id="customerName" style="color:var(--muted)"></small>
    </div>
    <div id="statusBadge" class="badge primary">PROCESSING</div>
  </div>

  <div class="progress-bar">
    <div id="progress" class="progress"></div>
  </div>
  <small id="progressText">0%</small>
</div>

<div class="card">
  <h3>Tracking Timeline</h3>
  <div class="timeline" id="timeline"></div>
</div>

</div>

<div>

<div class="card">
  <h3>Products</h3>
  <div id="images" class="product-gallery"></div>
  <p id="productName"></p>
  <h2 id="price"></h2>
</div>

<div class="card">
  <h3>Delivery Info</h3>
  <p id="address"></p>
  <p id="date"></p>
</div>

<div class="card actions">
  <a class="btn primary" href="#">Track Shipment</a>
  <a class="btn secondary" href="#">Contact Support</a>
</div>

</div>

</div>

</div>

<script>
  const supabaseClient = supabase.createClient(
  "https://jffkatwagcfshvddnipr.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpmZmthdHdhZ2Nmc2h2ZGRuaXByIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyMjc2MzUsImV4cCI6MjA4ODgwMzYzNX0.MnOvMKZ49gafMEToQeHYtmoH3qZVEJU3Yg8x3mykeQ8"
);

const orderNumber = document.getElementById("orderNumber");
const customerName = document.getElementById("customerName");
const productName = document.getElementById("productName");
const price = document.getElementById("price");
const address = document.getElementById("address");
const images = document.getElementById("images");
const progressText = document.getElementById("progressText");
const timeline = document.getElementById("timeline");

const id = new URLSearchParams(window.location.search).get("id");

if (!id) {
  document.body.innerHTML = "<h2 style='text-align:center;margin-top:50px'>Invalid tracking link</h2>";
}

async function load() {
  try {
    const { data, error } = await supabaseClient
      .from("orders")
      .select("*")
      .eq("tracking_id", id)
      .single();
    
    if (error || !data) {
      document.body.innerHTML = "<h2 style='text-align:center;margin-top:50px'>Order not found</h2>";
      return;
    }
    
    orderNumber.textContent = "Order #" + (data.order_number || "—");
    customerName.textContent = `${data.first_name || ""} ${data.last_name || ""}`;
    
    const products = Array.isArray(data.products) ? data.products : [];
    productName.textContent = products.map(p => p.name).join(", ") || "Products";
    
    price.textContent = "$" + (data.total || 0);
    address.textContent = data.full_address || "—";
    
    images.innerHTML = "";
    products.forEach(p => {
      if (p.image) {
        const img = document.createElement("img");
        img.src = p.image;
        images.appendChild(img);
      }
    });
    
    const status = (data.status || "").toLowerCase();
    let progress = 25;
    
    if (["paid", "packed"].includes(status)) progress = 50;
    if (["shipped", "on_the_way"].includes(status)) progress = 75;
    if (status === "delivered") progress = 100;
    
    const progressEl = document.getElementById("progress");
    progressEl.style.width = progress + "%";
    
    progressText.textContent =
      progress === 100 ?
      "🎉 Delivered Successfully" :
      progress + "% complete";
    
    const steps = ["Order Placed", "Packed", "Shipped", "Delivered"];
    timeline.innerHTML = "";
    
    steps.forEach((step, i) => {
      const done = (progress / 25) > i;
      timeline.innerHTML += `
        <div class="timeline-item">
          <div class="timeline-icon">${done ? "✔" : "•"}</div>
          <div><strong>${step}</strong></div>
        </div>`;
    });
    
    if (progress === 100) confetti();
    
  } catch (err) {
    document.body.innerHTML = "<h2 style='text-align:center;margin-top:50px'>Something went wrong</h2>";
  }
}

load();
</script>

</body>
</html>
