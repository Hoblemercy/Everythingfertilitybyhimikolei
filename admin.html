<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
:root{
  --bg:#0f172a;
  --card:#1e293b;
  --accent:#38bdf8;
  --success:#22c55e;
  --danger:#ef4444;
}

body{
  margin:0;
  font-family:system-ui, -apple-system, sans-serif;
  background:var(--bg);
  color:#fff;
  line-height:1.5;
}

/* LOGIN */
#login{
  display:flex;
  min-height:100vh;
  justify-content:center;
  align-items:center;
  padding:20px;
}

.login-box{
  background:var(--card);
  padding:30px;
  border-radius:16px;
  width:100%;
  max-width:340px;
  text-align:center;
  box-shadow:0 15px 40px rgba(0,0,0,0.6);
}

input, select, textarea, button {
  width:100%;
  padding:14px;
  margin-top:12px;
  border:none;
  border-radius:8px;
  font-size:1rem;
}

input, select, textarea {
  background:#334155;
  color:white;
}

button{
  background:var(--accent);
  color:white;
  font-weight:600;
  cursor:pointer;
  transition:all 0.2s;
}

button:hover{
  background:#22d3ee;
  transform:translateY(-1px);
}

/* DASHBOARD */
#app{display:none;}

header{
  padding:18px 20px;
  background:#020617;
  text-align:center;
  font-weight:600;
  font-size:1.25rem;
  position:sticky;
  top:0;
  z-index:100;
}

.container{
  padding:15px;
  max-width:1200px;
  margin:0 auto;
}

.grid{
  display:grid;
  gap:16px;
}

@media(min-width:768px){
  .grid{grid-template-columns:repeat(auto-fit, minmax(280px, 1fr));}
}

.card{
  background:var(--card);
  padding:20px;
  border-radius:14px;
  box-shadow:0 4px 20px rgba(0,0,0,0.3);
}

/* Scrollable Table for Mobile */
.table-wrapper {
  overflow-x:auto;
  -webkit-overflow-scrolling:touch;
  border-radius:10px;
  margin-top:12px;
}

table{
  width:100%;
  min-width:700px; /* forces horizontal scroll on small screens */
  border-collapse:collapse;
}

th, td{
  padding:14px 12px;
  text-align:left;
  border-bottom:1px solid #334155;
  white-space:nowrap;
}

th{
  background:#0f172a;
  color:var(--accent);
  position:sticky;
  top:0;
  z-index:10;
}

.status{
  padding:6px 14px;
  border-radius:9999px;
  font-size:0.85rem;
  font-weight:600;
  display:inline-block;
}

.status-pending { background:#f59e0b; color:#000; }
.status-paid { background:#22c55e; color:#000; }
.status-packed { background:#3b82f6; color:white; }
.status-on_the_way { background:#8b5cf6; color:white; }
.status-delivered { background:#10b981; color:white; }
.status-flagged { background:#ef4444; color:white; }

.ticket-card{
  background:#334155;
  padding:18px;
  border-radius:12px;
  margin-bottom:16px;
}

.action-btn{
  padding:8px 16px;
  font-size:0.9rem;
  border-radius:8px;
  cursor:pointer;
  transition:all 0.2s;
}

.action-btn:hover{
  transform:scale(1.05);
}

/* Premium Spinner */
.loading-overlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(15, 23, 42, 0.85);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 9999;
  flex-direction: column;
  gap: 16px;
  color: #fff;
}

.spinner {
  width: 56px;
  height: 56px;
  border: 6px solid rgba(56, 189, 248, 0.2);
  border-top: 6px solid var(--accent);
  border-radius: 50%;
  animation: spin 1s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

/* Toast */
.toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%);
  background: #1e293b;
  color: white;
  padding: 14px 24px;
  border-radius: 12px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  display: flex;
  align-items: center;
  gap: 12px;
  z-index: 10000;
  min-width: 280px;
  max-width: 90%;
  opacity: 0;
  transition: all 0.3s ease;
  font-weight: 500;
}

.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(-10px);
}

.toast.success { border-left: 5px solid var(--success); }
.toast.error { border-left: 5px solid var(--danger); }

.toast i {
  font-size: 1.3rem;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <div class="login-box">
    <h3><i class="fa-solid fa-lock"></i> Admin Login</h3>
    <input type="password" id="password" placeholder="Enter admin password">
    <button onclick="login()"><i class="fa-solid fa-right-to-bracket"></i> Login</button>
  </div>
</div>

<!-- APP -->
<div id="app">
  <header><i class="fa-solid fa-gauge"></i> Admin Dashboard</header>

  <div class="container">
    <!-- STATS -->
    <div class="grid">
      <div class="card"><i class="fa-solid fa-box"></i> Total Orders: <strong id="totalOrders">0</strong></div>
      <div class="card"><i class="fa-solid fa-ticket"></i> Total Tickets: <strong id="totalTickets">0</strong></div>
    </div>

    <!-- ORDERS -->
    <div class="card">
      <h3><i class="fa-solid fa-cart-shopping"></i> Orders</h3>
      <input type="text" placeholder="Search by email..." oninput="searchOrders(this.value)" style="margin-bottom:12px; max-width:320px;">

      <div class="table-wrapper">
        <table id="ordersTable">
          <thead>
            <tr>
              <th>Order #</th>
              <th>Customer</th>
              <th>Email</th>
              <th>Phone</th>
              <th>Total (USD)</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>

    <!-- TICKETS -->
    <div class="card">
      <h3><i class="fa-solid fa-envelope"></i> Support Tickets</h3>
      <div id="tickets"></div>
    </div>

    <!-- BROADCAST -->
    <div class="card">
      <h3><i class="fa-solid fa-bullhorn"></i> Broadcast Message</h3>
      <textarea id="msg" rows="3" placeholder="Type your message here..."></textarea>
      <input id="link" placeholder="Optional link (https://...)">
      <input id="emails" placeholder="Emails (comma separated)">
      <button onclick="sendBroadcast()"><i class="fa-solid fa-paper-plane"></i> Send Broadcast</button>
    </div>
  </div>
</div>

<!-- Premium Loading Spinner -->
<div id="loadingOverlay" class="loading-overlay">
  <div class="spinner"></div>
  <div id="loadingText">Processing...</div>
</div>

<!-- Toast Container -->
<div id="toastContainer"></div>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

const supabaseUrl = "https://jffkatwagcfshvddnipr.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpmZmthdHdhZ2Nmc2h2ZGRuaXByIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyMjc2MzUsImV4cCI6MjA4ODgwMzYzNX0.MnOvMKZ49gafMEToQeHYtmoH3qZVEJU3Yg8x3mykeQ8";

const supabase = createClient(supabaseUrl, supabaseKey);

const EDGE_FUNCTION_URL = "https://jffkatwagcfshvddnipr.supabase.co/functions/v1";
const HASH = "d51566119c8e92e33598ed78543e259ab19e99cc456181c604a2881198d6f958";

let allOrders = [];

// SHA-256
async function sha256(text){
  const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(text));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("");
}

/* Toast Function */
function showToast(message, type = "success") {
  const toast = document.createElement("div");
  toast.className = `toast ${type}`;
  toast.innerHTML = `
    ${type === "success" ? '<i class="fa-solid fa-check-circle"></i>' : 
      type === "error" ? '<i class="fa-solid fa-circle-xmark"></i>' : 
      '<i class="fa-solid fa-info-circle"></i>'}
    <span>${message}</span>
  `;
  document.getElementById("toastContainer").appendChild(toast);
  
  setTimeout(() => toast.classList.add("show"), 10);
  
  setTimeout(() => {
    toast.classList.remove("show");
    setTimeout(() => toast.remove(), 300);
  }, 4000);
}

/* Show/Hide Loading */
function showLoading(text = "Processing...") {
  document.getElementById("loadingText").textContent = text;
  document.getElementById("loadingOverlay").style.display = "flex";
}

function hideLoading() {
  document.getElementById("loadingOverlay").style.display = "none";
}

/* LOGIN */
window.login = async function(){
  const input = document.getElementById("password").value.trim();
  if (!input) return showToast("Please enter password", "error");

  showLoading("Verifying...");
  const hashed = await sha256(input);
  hideLoading();

  if(hashed === HASH){
    document.getElementById("login").style.display="none";
    document.getElementById("app").style.display="block";
    init();
  } else {
    showToast("❌ Wrong password", "error");
  }
};

/* INIT */
async function init(){
  showLoading("Loading dashboard...");
  await Promise.all([loadOrders(), loadTickets()]);
  hideLoading();
}

/* ================== ORDERS ================== */
async function loadOrders(){
  const { data, error } = await supabase
    .from("orders")
    .select("*")
    .order("created_at", { ascending: false });

  if (error) {
    console.error(error);
    showToast("Failed to load orders", "error");
    return;
  }

  allOrders = data || [];
  document.getElementById("totalOrders").innerText = allOrders.length;
  renderTable(allOrders);
}

/* Updated renderTable with Status Selector */
function renderTable(orders) {
  const tbody = document.querySelector("#ordersTable tbody");
  tbody.innerHTML = "";

  orders.forEach(order => {
    const currentStatus = (order.status || 'pending').toLowerCase().replace(/\s+/g, '_');

    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td><strong>#${order.order_number || order.id?.slice(0,8)}</strong></td>
      <td>${order.first_name || ''} ${order.last_name || ''}</td>
      <td>${order.email || ''}</td>
      <td>${order.phone || '—'}</td>
      <td>$${Number(order.total || 0).toFixed(2)}</td>
      <td>
        <select class="status-select" id="status-${order.id}">
          <option value="pending" ${currentStatus === 'pending' ? 'selected' : ''}>Pending</option>
          <option value="paid" ${currentStatus === 'paid' ? 'selected' : ''}>Paid</option>
          <option value="packed" ${currentStatus === 'packed' ? 'selected' : ''}>Packed</option>
          <option value="on_the_way" ${currentStatus === 'on_the_way' ? 'selected' : ''}>On the Way</option>
          <option value="delivered" ${currentStatus === 'delivered' ? 'selected' : ''}>Delivered</option>
          <option value="flagged" ${currentStatus === 'flagged' ? 'selected' : ''}>Flagged</option>
        </select>
      </td>
      <td>
        <button class="action-btn" onclick="sendTracking('${order.id}', '${order.email || ''}')" style="background:var(--accent); margin-right:6px;">
          <i class="fa-solid fa-location-dot"></i>
        </button>
        <button class="update-btn" onclick="updateOrderStatus('${order.id}')">
          <i class="fa-solid fa-save"></i> Update
        </button>
      </td>
    `;
    tbody.appendChild(tr);
  });
}

/* New Function: Update Order Status */
window.updateOrderStatus = async function(orderId) {
  const select = document.getElementById(`status-${orderId}`);
  const newStatus = select.value;

  showLoading("Updating status...");

  const { error } = await supabase
    .from("orders")
    .update({ status: newStatus })
    .eq("id", orderId);

  hideLoading();

  if (error) {
    showToast("Failed to update status", "error");
  } else {
    showToast(`Status updated to ${newStatus.replace(/_/g, ' ')}`, "success");
    loadOrders(); // Refresh the table
  }
};


window.searchOrders = function(q){
  const filtered = allOrders.filter(o => 
    (o.email || "").toLowerCase().includes(q.toLowerCase())
  );
  renderTable(filtered);
};

/* ================== SEND TRACKING ================== */
/* ================== SEND TRACKING (Beautiful HTML Template) ================== */
window.sendTracking = async function(id, email) {
  if (!email) return showToast("No email found for this order!", "error");
  if (!confirm("Send beautiful tracking email to " + email + "?")) return;
  
  showLoading("Sending premium tracking email...");
  
  const tracking_id = crypto.randomUUID();
  
  const { error: updateError } = await supabase
    .from("orders")
    .update({ tracking_id })
    .eq("id", id);
  
  if (updateError) {
    hideLoading();
    return showToast("Failed to generate tracking ID", "error");
  }
  
  const trackLink = `https://yourdomain.com/track.html?id=${tracking_id}`;
  
  const htmlTemplate = `
    <div style="font-family: Inter, system-ui; max-width: 600px; margin: 0 auto; padding: 40px 20px; background: #0f172a; color: #f1f5f9; line-height: 1.6;">
      <h1 style="color: #6366f1; text-align: center; margin-bottom: 30px;">Everything Fertility by Himiko</h1>
      <div style="background: #1e293b; padding: 40px; border-radius: 20px;">
        <h2 style="text-align:center; color:#22d3ee;">Your Order Tracking Link is Ready!</h2>
        <p style="font-size:17px; text-align:center;">Hello,</p>
        <p style="font-size:17px;">Your tracking number is: <strong>${tracking_id}</strong></p>
        <p style="text-align:center; margin:40px 0;">
          <a href="${trackLink}" style="background:#6366f1; color:white; padding:18px 36px; text-decoration:none; border-radius:9999px; font-size:18px; font-weight:700; display:inline-block;">
            📍 Track Your Order Now
          </a>
        </p>
        <p style="text-align:center; color:#94a3b8;">Thank you for choosing us!<br>We can't wait for you to receive your order ❤️</p>
      </div>
      <p style="text-align:center; margin-top:30px; color:#64748b; font-size:14px;">
        Everything Fertility by Himiko • admin@everythingfertilitybyhimikolie.shop
      </p>
    </div>`;
  
  try {
    const response = await fetch(`${EDGE_FUNCTION_URL}/send-mail`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        email: email,
        subject: "Your Order Tracking Link is Ready ✨",
        html: htmlTemplate
      })
    });
    
    const result = await response.json();
    hideLoading();
    
    if (result.success) {
      showToast(`✅ Beautiful tracking email sent to ${email}`);
    } else {
      showToast("Failed to send email", "error");
    }
  } catch (e) {
    hideLoading();
    showToast("Failed to send tracking email", "error");
  }
};

/* ================== SEND BROADCAST (Already uses HTML in the function) ================== */
window.sendBroadcast = async function() {
  const msg = document.getElementById("msg").value.trim();
  const link = document.getElementById("link").value.trim();
  let emailsInput = document.getElementById("emails").value.trim();
  
  if (!msg) return showToast("Message cannot be empty", "error");
  
  const emails = emailsInput ? emailsInput.split(",").map(e => e.trim()).filter(Boolean) : [];
  
  if (emails.length === 0) return showToast("Please add at least one email", "error");
  
  showLoading("Sending broadcast to " + emails.length + " recipients...");
  
  try {
    const response = await fetch(`${EDGE_FUNCTION_URL}/send-broadcast`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ msg, link, emails })
    });
    
    const result = await response.json();
    hideLoading();
    
    if (result.success) {
      showToast(`✅ Broadcast sent to ${emails.length} recipients!`);
    } else {
      showToast("Failed to send broadcast", "error");
    }
  } catch (e) {
    hideLoading();
    showToast("Failed to send broadcast", "error");
  }
};

/* ================== TICKETS ================== */
async function loadTickets(){
  const { data, error } = await supabase
    .from("tickets")
    .select("*")
    .order("created_at", { ascending: false });

  if (error) {
    console.error(error);
    showToast("Failed to load tickets", "error");
    return;
  }

  document.getElementById("totalTickets").innerText = data?.length || 0;

  document.getElementById("tickets").innerHTML = (data || []).map(t => `
    <div class="ticket-card">
      <b>${t.name}</b>
      <div style="font-size:0.9rem; opacity:0.8;">${t.email}</div>
      <div><strong>${t.issue_type}</strong></div>
      <p>${t.message}</p>
      <button onclick="markResolved('${t.id}')" style="background:var(--success); width:auto; padding:10px 18px; border-radius:8px;">
        <i class="fa-solid fa-check"></i> Mark Resolved
      </button>
    </div>
  `).join("");
}

window.markResolved = async function(id){
  if(confirm("Mark this ticket as resolved?")){
    showLoading();
    await supabase.from("tickets").update({ status: "resolved" }).eq("id", id);
    hideLoading();
    showToast("Ticket marked as resolved");
    loadTickets();
  }
};


</script>

</body>
</html>
